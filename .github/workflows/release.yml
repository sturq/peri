name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3

      - name: Resolve tag
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write signing config from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks
          cat > keystore.properties <<EOF
          storeFile=app/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          uploadKeyAlias=$KEY_ALIAS
          uploadKeyPassword=$KEY_PASSWORD
          EOF

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          DST="peri-${{ steps.ver.outputs.tag }}.apk"
          cp "$SRC" "$DST"
          echo "APK=$DST" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: ${{ env.APK }}
          fail_on_unmatched_files: true
